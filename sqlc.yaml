version: "2"
sql:
  - engine: mysql
    schema: ./sql/migrations
    queries: ./sql/queries/users.sql
    gen:
      go:
        package: userdbgen
        out: ./server/internal/user/internal/infra/dbgen
        sql_package: "database/sql"
        emit_json_tags: false
        emit_interface: true
        emit_empty_slices: true

  - engine: mysql
    schema: ./sql/migrations
    queries: ./sql/queries/meals.sql
    gen:
      go:
        package: mealdbgen
        out: ./server/internal/meal/internal/infra/dbgen
        sql_package: "database/sql"
        emit_json_tags: false
        emit_interface: true
        emit_empty_slices: true
