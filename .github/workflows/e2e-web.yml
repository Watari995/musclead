name: E2E (web mobile UI)

# モバイル UI 崩れ (要素のはみ出し / 水平スクロール / 重大 a11y 違反) を
# 機械的に検出するための E2E。 web/ または server/ への変更で必ず動かす。
on:
  push:
    branches: [main, develop]
    paths:
      - "web/**"
      - "server/**"
      - "sql/migrations/**"
      - ".github/workflows/e2e-web.yml"
  pull_request:
    paths:
      - "web/**"
      - "server/**"
      - "sql/migrations/**"
      - ".github/workflows/e2e-web.yml"

# 同一ブランチで複数 PR push が走ったら古い run はキャンセル
concurrency:
  group: e2e-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: mobile UI guard
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: musclead
          MYSQL_USER: musclead
          MYSQL_PASSWORD: musclead
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uroot -proot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30

    env:
      # ---- DB ----
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: musclead
      DB_PASSWORD: musclead
      DB_NAME: musclead
      # ---- Server ----
      ADDR: ":8080"
      ALLOWED_ORIGIN: http://localhost:3000
      JWT_SECRET: e2e-only-not-for-prod-0123456789abcdef0123456789abcdef
      # ---- Web ----
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      # ---- E2E ----
      E2E_BASE_URL: http://localhost:3000
      E2E_API_BASE_URL: http://localhost:8080

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install golang-migrate
        run: |
          curl -fsSL https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz \
            | tar xz
          sudo mv migrate /usr/local/bin/migrate
          migrate -version

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 60); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent; then
              echo "MySQL is up"; exit 0
            fi
            sleep 1
          done
          echo "MySQL did not become ready in time"; exit 1

      - name: Run migrations
        run: |
          migrate \
            -path sql/migrations \
            -database "mysql://musclead:musclead@tcp(127.0.0.1:3306)/musclead?parseTime=true&multiStatements=true" \
            up

      - name: Generate swagger docs
        working-directory: server
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/server/main.go -o docs

      - name: Build server
        working-directory: server
        run: go build -o ../bin/server ./cmd/server

      - name: Start server
        run: |
          nohup ./bin/server > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server (/health)
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://127.0.0.1:8080/health > /dev/null; then
              echo "server ready"; exit 0
            fi
            sleep 1
          done
          echo "---- server.log ----"
          cat server.log || true
          exit 1

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: web
        run: npx playwright install-deps chromium

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Start web
        working-directory: web
        run: |
          nohup npm run start -- -p 3000 > web.log 2>&1 &
          echo $! > web.pid

      - name: Wait for web
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://127.0.0.1:3000 > /dev/null; then
              echo "web ready"; exit 0
            fi
            sleep 1
          done
          echo "---- web.log ----"
          cat web/web.log || true
          exit 1

      - name: Run Playwright E2E
        working-directory: web
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/playwright-report
            web/test-results
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
          if-no-files-found: ignore
