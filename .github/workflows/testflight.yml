name: TestFlight

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'バージョン番号 (例: 1.0.1)'
        required: true
        type: string

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Flutter pub get
        working-directory: mobile
        run: fvm flutter pub get

      - name: Build runner
        working-directory: mobile
        run: fvm dart run build_runner build --delete-conflicting-outputs

      - name: Set up signing keychain
        env:
          CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=/tmp/ci-signing.keychain
          KEYCHAIN_PASS=ci_temp_$(date +%s)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          echo "$CERT_BASE64" | base64 --decode > /tmp/ci-cert.p12
          security import /tmp/ci-cert.p12 -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" -A -T /usr/bin/codesign
          rm /tmp/ci-cert.p12
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/musclead_AppStore.mobileprovision

      - name: Set up App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Install GoogleService-Info.plist
        working-directory: mobile
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode \
            > ios/Runner/GoogleService-Info.plist

      - name: Flutter build iOS (no codesign)
        working-directory: mobile
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          fvm flutter build ios --release \
            --build-name="${{ inputs.version }}" \
            --build-number=${{ github.run_number }} \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --no-codesign

      - name: xcodebuild archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -workspace mobile/ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath /tmp/musclead.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="5309b3f1-e8f0-40ee-89d8-d88acf4e7496" \
            DEVELOPMENT_TEAM=44675MS8C4

      - name: xcodebuild export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath /tmp/musclead.xcarchive \
            -exportPath /tmp/musclead-ipa \
            -exportOptionsPlist mobile/ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file /tmp/musclead-ipa/*.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Clean up
        if: always()
        run: |
          security delete-keychain /tmp/ci-signing.keychain 2>/dev/null || true
          rm -f /tmp/musclead-ipa/*.ipa
          rm -rf /tmp/musclead.xcarchive
