# 本番(Oracle VM 等)用 docker-compose。Go + MySQL + Caddy を 1 台に載せる。
#
# 使い方(VM 上、リポジトリ root から):
#   cp deploy/.env.example deploy/.env      # 値を埋める
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
#
# 更新時:
#   git pull && docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
#
# 注意: build context は repo root(..)。Dockerfile が sql/migrations を参照するため。

name: musclead

services:
  db:
    image: mysql:8.0
    restart: always
    # 低メモリ VM 向けにメモリ使用を絞る
    command:
      - --innodb-buffer-pool-size=128M
      - --performance-schema=OFF
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql # データは永続ボリュームへ(再起動で消えない)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
    # 外部公開しない(VM 内からのみ接続)

  server:
    # CI(GitHub Actions)がビルドして ghcr.io へ push したイメージを pull する。
    # VM ではビルドしない(1GBなので軽量・高速・安全)。
    image: ghcr.io/watari995/musclead-server:latest
    pull_policy: always
    restart: always
    env_file: .env
    # compose が固定で上書きする値(.env より優先)
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      ADDR: ":8080"
    depends_on:
      db:
        condition: service_healthy
    # 公開は Caddy 経由。直接ポート公開はしない

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data # 取得した TLS 証明書の保存先
      - caddy-config:/config
    depends_on:
      - server

volumes:
  db-data:
  caddy-data:
  caddy-config:
