# Codemagic CI/CD — iOS ビルド & TestFlight 配信（Flutter プロジェクトは mobile/）。
# 事前に Codemagic UI で App Store Connect API キー連携（名前: musclead_asc）と
# 環境変数グループ（app_store_connect）を設定すること。
workflows:
  ios-testflight:
    name: musclead iOS (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: mobile
    integrations:
      app_store_connect: musclead_asc
    environment:
      flutter: 3.41.7
      xcode: latest
      cocoapods: default
      groups:
        - app_store_connect
      vars:
        BUNDLE_ID: "com.musclead.musclead"
        APP_STORE_APPLE_ID: "0000000000" # App Store Connect のアプリ Apple ID に置換
      # Codemagic UI の Environment variables に SENTRY_DSN を追加すること
      # (Group: app_store_connect または単独で設定)
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'mobile-v*'
          include: true
    scripts:
      - name: Flutter dependencies
        script: flutter pub get
      - name: Generate code (build_runner)
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Analyze & test
        script: |
          flutter analyze
          flutter test
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          # ビルド番号は Codemagic のビルドカウンタで毎回ユニークにする（TestFlight 要件）。
          flutter build ipa --release \
            --dart-define=FLAVOR=prod \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # まず TestFlight に配信。
        submit_to_testflight: true
        # 外部テスターへ配るなら、ASC で作成済みのグループ名を指定（任意）。
        # beta_groups:
        #   - "musclead beta"
        # そのまま App Store 審査へ提出する。
        # ※ 初回は ASC でスクショ・説明文・プライバシー・年齢レーティング等を
        #    一度入力しておかないと提出は失敗する（メタデータ未整備のため）。
        submit_to_app_store: true
        # 審査通過後の公開方法。AFTER_APPROVAL=承認され次第自動公開。
        # 手動で公開ボタンを押したい場合は MANUAL に変更。
        release_type: AFTER_APPROVAL
        # 審査待ちの旧バージョンがあれば取り下げてから提出。
        cancel_previous_submissions: true
