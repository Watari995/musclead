# Codemagic CI/CD — iOS ビルド & TestFlight 配信（Flutter プロジェクトは mobile/）。
# 事前に Codemagic UI で App Store Connect API キー連携（名前: musclead_asc）と
# 環境変数グループ（app_store_connect）を設定すること。
workflows:
  ios-testflight:
    name: musclead iOS (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: mobile
    integrations:
      app_store_connect: musclead_asc
    environment:
      flutter: 3.41.7
      xcode: latest
      cocoapods: default
      groups:
        - app_store_connect
      vars:
        BUNDLE_ID: "com.musclead.musclead"
        APP_STORE_APPLE_ID: "0000000000" # App Store Connect のアプリ Apple ID に置換
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'mobile-v*'
          include: true
    scripts:
      - name: Flutter dependencies
        script: flutter pub get
      - name: Generate code (build_runner)
        script: dart run build_runner build
      - name: Analyze & test
        script: |
          flutter analyze
          flutter test
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --dart-define=FLAVOR=prod \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
