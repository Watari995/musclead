# json_serializable をバックエンドの snake_case JSON に合わせる。
# Dart 側は camelCase のまま、JSON キーは snake_case に自動変換。
targets:
  $default:
    builders:
      json_serializable:
        options:
          field_rename: snake
          explicit_to_json: true
          create_to_json: true
          include_if_null: false
